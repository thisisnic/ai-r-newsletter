name: Weekly newsletter

on:
  schedule:
    - cron: '0 1 * * 0'  # Sundays 01:00 UTC
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::tidyRSS
            any::readr
            any::tibble
            any::fs
            any::ellmer

      - name: Fetch Substacks
        run: Rscript R/fetch_substacks.R

      - name: Fetch GitHub releases
        run: Rscript R/fetch_github.R

      - name: Summarise
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: Rscript R/summarise.R

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/ newsletters/ seen.csv 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Weekly newsletter run $(date -u +%Y-%m-%d)"
            git push
          fi
